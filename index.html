<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声入力 - cocoromi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  background: #f7f9fb;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  color: #2a3f55;
}
.card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 8px 32px rgba(26,58,92,.15);
  padding: 32px 28px; width: 100%; max-width: 480px;
  text-align: center;
}
h2 { font-size: 18px; color: #1a3a5c; margin-bottom: 8px; }
p.sub { font-size: 12.5px; color: #8fa5be; margin-bottom: 24px; line-height: 1.6; }

.mic-btn {
  width: 96px; height: 96px; border-radius: 50%;
  background: #3ab8a0; border: none; cursor: pointer;
  font-size: 44px; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; transition: all .2s;
  box-shadow: 0 4px 16px rgba(58,184,160,.35);
}
.mic-btn:hover { transform: scale(1.05); }
.mic-btn.recording {
  background: #e05252;
  box-shadow: 0 4px 24px rgba(224,82,82,.4);
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.status {
  font-size: 13px; color: #8fa5be; margin-bottom: 16px;
  min-height: 20px; font-weight: 600;
}
.status.active { color: #e05252; }

/* リアルタイム認識中テキスト */
.interim-text {
  min-height: 36px;
  font-size: 13px; color: #8fa5be;
  font-style: italic; margin-bottom: 10px;
  line-height: 1.6;
}

.transcript-box {
  width: 100%; min-height: 120px;
  border: 1.5px solid #dde4ed; border-radius: 10px;
  padding: 12px 14px; font-size: 14px;
  font-family: inherit; color: #2a3f55;
  resize: vertical; outline: none; margin-bottom: 16px;
  line-height: 1.7;
}
.transcript-box:focus {
  border-color: #3ab8a0;
  box-shadow: 0 0 0 3px rgba(58,184,160,.12);
}

.btn-row { display: flex; gap: 10px; justify-content: center; }
.btn {
  padding: 11px 24px; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  border: none; transition: all .2s;
}
.btn-primary { background: #1a3a5c; color: #fff; flex: 1; }
.btn-primary:hover { background: #244d7a; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-clear { background: #f0f4f8; color: #4a6180; }
.btn-clear:hover { background: #dde4ed; }

.error-msg {
  display: none; color: #e05252; font-size: 13px;
  background: #fff0f0; border-radius: 8px;
  padding: 10px 14px; margin-bottom: 14px;
  text-align: left; line-height: 1.6; white-space: pre-wrap;
}
.error-msg.show { display: block; }

.badge-safari {
  display: inline-block; margin-top: 16px;
  padding: 4px 12px; border-radius: 20px;
  background: #fff4e0; color: #f0a030;
  font-size: 11px; font-weight: 600;
}
</style>
</head>
<body>
<div class="card">
  <h2>🎙️ 音声入力</h2>
  <p class="sub">ボタンを押して話してください<br>話し終わったらもう一度押して停止</p>

  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
  <div class="status" id="status">タップして録音開始</div>
  <div class="interim-text" id="interimText"></div>
  <div class="error-msg" id="errorMsg"></div>

  <textarea class="transcript-box" id="transcript"
    placeholder="ここに音声が文字起こしされます..."></textarea>

  <div class="btn-row">
    <button class="btn btn-clear" onclick="clearText()">クリア</button>
    <button class="btn btn-primary" id="sendBtn"
      onclick="sendToParent()" disabled>✅ この内容で確定</button>
  </div>

  <div id="safariWarning" style="display:none">
    <span class="badge-safari">⚠️ SafariはWeb Speech API非対応です。Chromeをお使いください。</span>
  </div>
</div>

<script>
// ============================================================
//  cocoromi 音声入力ページ（GitHub Pages / Web Speech API版）
//  Chrome PC・Chrome Android 対応
//  Safari は非対応（警告表示のみ）
// ============================================================

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

// Safari判定
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

let recognition  = null;
let isRecording  = false;
let finalText    = '';

window.addEventListener('load', () => {
  if (!SpeechRecognition) {
    document.getElementById('safariWarning').style.display = 'block';
    document.getElementById('micBtn').disabled = true;
    document.getElementById('micBtn').style.opacity = '0.4';
    showError('このブラウザは音声入力に対応していません。\nChromeをお使いください。');
    return;
  }
  if (isSafari) {
    document.getElementById('safariWarning').style.display = 'block';
  }
});

function toggleRecording() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  if (!SpeechRecognition) return;

  finalText = document.getElementById('transcript').value;

  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹️';
    document.getElementById('status').classList.add('active');
    setStatus('🔴 録音中... もう一度押すと停止');
    hideError();
  };

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    document.getElementById('transcript').value = finalText;
    document.getElementById('interimText').textContent = interim ? '（認識中: ' + interim + '）' : '';
    document.getElementById('sendBtn').disabled = !finalText.trim();
  };

  recognition.onerror = e => {
    isRecording = false;
    resetMicBtn();
    if (e.error === 'not-allowed') {
      showError('マイクへのアクセスが拒否されました。\nアドレスバー横のマイクアイコンから許可してください。');
    } else if (e.error === 'no-speech') {
      setStatus('音声が検出されませんでした。もう一度お試しください。');
    } else {
      showError('エラー: ' + e.error);
    }
  };

  recognition.onend = () => {
    isRecording = false;
    resetMicBtn();
    document.getElementById('interimText').textContent = '';
    if (finalText.trim()) {
      setStatus('✅ 完了。内容を確認して「確定」を押してください');
      document.getElementById('sendBtn').disabled = false;
    } else {
      setStatus('タップして録音開始');
    }
  };

  recognition.start();
}

function stopRecording() {
  if (recognition) {
    recognition.stop();
  }
}

function resetMicBtn() {
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎙️';
  document.getElementById('status').classList.remove('active');
}

function clearText() {
  finalText = '';
  document.getElementById('transcript').value = '';
  document.getElementById('interimText').textContent = '';
  document.getElementById('sendBtn').disabled = true;
  setStatus('タップして録音開始');
  hideError();
}

function sendToParent() {
  const text = document.getElementById('transcript').value.trim();
  if (!text) return;
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'VOICE_RESULT', text }, '*');
    window.close();
  }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
</script>
</body>
</html>
