<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声入力 - cocoromi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  background: #f7f9fb;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  color: #2a3f55;
}
.card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 8px 32px rgba(26,58,92,.15);
  padding: 32px 28px; width: 100%; max-width: 480px;
  text-align: center;
}
h2 { font-size: 18px; color: #1a3a5c; margin-bottom: 8px; }
p.sub { font-size: 12.5px; color: #8fa5be; margin-bottom: 24px; }

.mic-btn {
  width: 96px; height: 96px; border-radius: 50%;
  background: #3ab8a0; border: none; cursor: pointer;
  font-size: 44px; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; transition: all .2s;
  box-shadow: 0 4px 16px rgba(58,184,160,.35);
}
.mic-btn:hover { transform: scale(1.05); }
.mic-btn.recording {
  background: #e05252;
  box-shadow: 0 4px 24px rgba(224,82,82,.4);
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.status {
  font-size: 13px; color: #8fa5be; margin-bottom: 16px;
  min-height: 20px; font-weight: 600;
}
.status.active { color: #e05252; }

.transcript-box {
  width: 100%; min-height: 120px;
  border: 1.5px solid #dde4ed; border-radius: 10px;
  padding: 12px 14px; font-size: 14px;
  font-family: inherit; color: #2a3f55;
  resize: vertical; outline: none; margin-bottom: 16px;
  line-height: 1.7;
}
.transcript-box:focus {
  border-color: #3ab8a0;
  box-shadow: 0 0 0 3px rgba(58,184,160,.12);
}

.transcribing-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,58,92,.45);
  align-items: center; justify-content: center;
  z-index: 999;
}
.transcribing-overlay.show { display: flex; }
.transcribing-box {
  background: #fff; border-radius: 14px;
  padding: 28px 36px; text-align: center;
  box-shadow: 0 8px 32px rgba(26,58,92,.2);
}
.spinner {
  width: 40px; height: 40px;
  border: 4px solid #dde4ed;
  border-top-color: #3ab8a0;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.transcribing-box p { font-size: 13.5px; color: #4a6180; font-weight: 600; }

.btn-row { display: flex; gap: 10px; justify-content: center; }
.btn {
  padding: 11px 24px; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  border: none; transition: all .2s;
}
.btn-primary { background: #1a3a5c; color: #fff; flex: 1; }
.btn-primary:hover { background: #244d7a; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-clear { background: #f0f4f8; color: #4a6180; }
.btn-clear:hover { background: #dde4ed; }

.error-msg {
  display: none; color: #e05252; font-size: 13px;
  background: #fff0f0; border-radius: 8px;
  padding: 10px 14px; margin-bottom: 14px;
  text-align: left; line-height: 1.6;
  white-space: pre-wrap;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="transcribing-overlay" id="transcribingOverlay">
  <div class="transcribing-box">
    <div class="spinner"></div>
    <p>Gemini が書き起こし中...</p>
  </div>
</div>

<div class="card">
  <h2>🎙️ 音声入力</h2>
  <p class="sub">マイクボタンを押して話してください</p>

  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
  <div class="status" id="status">タップして録音開始</div>
  <div class="error-msg" id="errorMsg"></div>

  <textarea class="transcript-box" id="transcript"
    placeholder="ここに書き起こされたテキストが入ります..."></textarea>

  <div class="btn-row">
    <button class="btn btn-clear" onclick="clearText()">クリア</button>
    <button class="btn btn-primary" id="sendBtn"
      onclick="sendToParent()" disabled>✅ この内容で確定</button>
  </div>
</div>

<script>
// ============================================================
//  cocoromi 音声入力ページ（GitHub Pages ホスト版）
//
//  ① MediaRecorder で録音
//  ② base64 に変換して GAS の transcribeAudio() に送信
//  ③ Gemini が書き起こした結果を postMessage で親ウィンドウ（GAS）に返す
//
//  ▼ GAS_ENDPOINT を日報システムのデプロイURLに変更してください ▼
// ============================================================

const GAS_ENDPOINT = 'https://script.google.com/a/macros/cocoromi-cl.jp/s/AKfycbyiQRj3a4XSI1-7YW25HG4lPWUok8bp8v9L_jXePfPc72ObKHpzb2YlRvPUOhsLudb0/exec';

let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;

function toggleRecording() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showError('このブラウザは録音に対応していません。\nChromeまたはSafariをお使いください。');
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      audioChunks = [];

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : 'audio/mp4';

      mediaRecorder = new MediaRecorder(stream, { mimeType });

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        isRecording = false;
        resetMicBtn();

        if (audioChunks.length === 0) {
          setStatus('録音データがありません。もう一度お試しください。');
          return;
        }

        const blob      = new Blob(audioChunks, { type: mimeType });
        const cleanMime = mimeType.split(';')[0];

        showTranscribing(true);

        // base64変換
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64 = reader.result.split(',')[1];

          // GASのtranscribeAudio()をfetch経由で呼び出す
          fetch(GAS_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'transcribeAudio',
              base64Audio: base64,
              mimeType: cleanMime
            }),
            redirect: 'follow'
          })
          .then(r => r.json())
          .then(res => {
            showTranscribing(false);
            if (!res.ok) {
              showError('書き起こしエラー:\n' + res.error);
              return;
            }
            document.getElementById('transcript').value = res.text;
            document.getElementById('sendBtn').disabled = false;
            setStatus('✅ 書き起こし完了。内容を確認して「確定」を押してください');
          })
          .catch(err => {
            showTranscribing(false);
            showError('通信エラー:\n' + err.message);
          });
        };
        reader.readAsDataURL(blob);
      };

      mediaRecorder.start();
      isRecording = true;

      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹️';
      document.getElementById('status').classList.add('active');
      setStatus('🔴 録音中... もう一度押すと停止');
      hideError();
    })
    .catch(err => {
      if (err.name === 'NotAllowedError') {
        showError('マイクへのアクセスが拒否されました。\nアドレスバー横のマイクアイコンから許可してください。');
      } else {
        showError('マイク取得エラー: ' + err.message);
      }
    });
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    setStatus('⏳ 処理中...');
  }
}

function resetMicBtn() {
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎙️';
  document.getElementById('status').classList.remove('active');
}

function clearText() {
  document.getElementById('transcript').value = '';
  document.getElementById('sendBtn').disabled = true;
  setStatus('タップして録音開始');
  hideError();
}

function sendToParent() {
  const text = document.getElementById('transcript').value.trim();
  if (!text) return;
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'VOICE_RESULT', text }, '*');
    window.close();
  }
}

function showTranscribing(show) {
  document.getElementById('transcribingOverlay').classList.toggle('show', show);
}
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
</script>
</body>
</html>
